<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 420px;
      max-height: 600px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      overflow-y: auto;
      background: #f7f7f7;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #E92E2F;
    }

    .header h2 {
      margin: 0;
      color: #E92E2F;
      font-size: 20px;
    }

    .tracking-status {
      padding: 12px;
      background: #ffffff;
      border-radius: 6px;
      margin-bottom: 16px;
      border: 1px solid #e5e5e5;
    }

    .tracking-status.active {
      background: #fef2f2;
      border-left: 4px solid #E92E2F;
    }

    .tracking-status > div {
      margin-bottom: 6px;
      font-size: 13px;
    }

    .tracking-status > div:last-child {
      margin-bottom: 0;
    }

    .tracking-status strong {
      color: #1a1a1a;
    }

    #status-text {
      color: #808080;
    }

    .tracking-status.active #status-text {
      color: #E92E2F;
      font-weight: 600;
    }

    #rule-info {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e5e5e5;
    }

    h3 {
      margin: 16px 0 12px 0;
      font-size: 14px;
      color: #808080;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .version-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .version-item {
      padding: 12px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .version-item:hover {
      background: #f7f7f7;
      border-color: #E92E2F;
      transform: translateX(2px);
    }

    .version-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .version-type {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .type-create {
      background: #E92E2F;
      color: white;
    }

    .type-update {
      background: #50E9C3;
      color: #1a1a1a;
    }

    .type-delete {
      background: #7A1A1B;
      color: white;
    }

    .version-date {
      font-size: 11px;
      color: #aaaaaa;
    }

    .version-preview {
      font-size: 11px;
      color: #808080;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #f7f7f7;
      padding: 4px 8px;
      border-radius: 3px;
      margin-top: 6px;
    }

    .version-encoded {
      font-size: 10px;
      color: #aaaaaa;
      font-family: 'Courier New', monospace;
      margin-top: 4px;
      font-style: italic;
    }


    .empty-state {
      color: #aaaaaa;
      text-align: center;
      padding: 32px 16px;
      font-size: 13px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(0);
    }

    .auth-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .auth-section.logged-in {
      background: #fef2f2;
      border-color: #f5b8b8;
    }

    .auth-user {
      color: #1a1a1a;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      font-size: 12px;
    }

    .btn-auth {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn-login {
      background: #E92E2F;
      color: white;
    }

    .btn-login:hover {
      background: #7A1A1B;
      transform: translateY(-1px);
    }

    .btn-logout {
      background: #f7f7f7;
      color: #808080;
      border: 1px solid #e5e5e5;
      flex: unset;
      padding: 5px 12px;
      font-size: 11px;
    }

    .btn-logout:hover {
      background: #ebebeb;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Gittimus</h2>
    <button id="logout-btn" class="btn-auth btn-logout" style="display:none;">Logout</button>
  </div>

  <div id="auth-section" class="auth-section">
    <span id="auth-user" style="display:none;"></span>
    <button id="auth-btn" class="btn-auth btn-login">Login with Google</button>
  </div>

  <div id="tracking-status" class="tracking-status">
    <div><strong>Status:</strong> <span id="status-text">Not tracking</span></div>
    <div id="rule-info" style="display: none;">
      <strong>Rule:</strong> <span id="rule-name"></span> <span style="color: #999;">(#<span id="rule-id"></span>)</span>
    </div>
  </div>

  <h3>Your Rules</h3>
  <ul id="version-list" class="version-list">
    <li class="empty-state">No versions recorded yet</li>
  </ul>

  <script src="popup/popup.js" type="module"></script>
</body>
</html>
